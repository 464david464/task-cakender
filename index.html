<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Academic Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6a8d9d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-texture"></div>
    <div class="full-screen-container">
        <header>
            <div class="ornament"></div>
            <h1>לו"ז הגשות</h1>
            <div id="next-mission" class="mission-hero">
                <!-- Hero content injected here -->
            </div>
            <div class="ornament bottom"></div>
        </header>
        
        <main>
            <div id="tasks-grid" class="tasks-grid">
                <!-- Tasks will be injected here as grid items -->
            </div>
        </main>
        
    </div>
    <button id="theme-toggle" title="החלף מצב תצוגה">🌙</button>

    <!-- Remote Control Panel (Only for PC) -->
    <div id="remote-control" class="remote-panel" style="display: none;">
        <h3>שלט רחוק</h3>
        <div class="remote-grid">
            <button onclick="sendCommand('toggle_screen')" class="remote-btn btn-power" style="grid-column: span 2;">
                <span style="font-size: 1.5rem;">⏻</span> הדלק / כבה מסך
            </button>
            <button onclick="sendCommand('refresh')" class="remote-btn btn-blue" style="grid-column: span 2;">
                🚀 רענן והפעל מחדש
            </button>
        </div>
        <div id="remote-status" class="status-text">ממתין...</div>
    </div>

    <div id="undo-toast">
        מטלה סומנה כבוצעה.
        <button id="undo-btn">ביטול (Undo)</button>
    </div>

    <script src="script_v3.js"></script>
</body>
</html>
