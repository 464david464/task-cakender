<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Liquid Glass Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #010204;
            --accent: #a5b4fc;
            --spring: cubic-bezier(0.15, 1, 0.3, 1);
        }

        body { 
            width: 400px; font-family: 'Assistant', sans-serif; 
            background: var(--bg-void); color: #fff; margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .container { padding: 20px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; width: 100%;
        }

        h2 { font-size: 0.7rem; letter-spacing: 5px; font-family: 'JetBrains Mono'; opacity: 0.4; margin: 0; text-transform: uppercase; }

        #sync-status { font-size: 0.5rem; font-family: 'JetBrains Mono'; letter-spacing: 1px; text-transform: uppercase; opacity: 0.5; margin-top: 4px; }
        .status-syncing { color: var(--accent); opacity: 1 !important; }
        .status-success { color: #4ade80; opacity: 1 !important; }
        .status-error { color: #ef4444; opacity: 1 !important; }

        #archive-toggle {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent); padding: 6px 12px; border-radius: 20px;
            font-size: 0.65rem; font-family: 'JetBrains Mono'; cursor: pointer; display: none;
        }

        /* --- THE SHARP REFRACTION SYSTEM --- */
        .task-card-wrapper {
            position: relative;
            margin-bottom: 25px;
            border-radius: 32px;
            min-height: 140px;
            background: #000;
            transition: transform 0.6s var(--spring);
            overflow: hidden;
            cursor: pointer;
        }
        .task-card-wrapper:hover { transform: scale(1.01) translateY(-2px); }

        .art-backdrop {
            position: absolute;
            bottom: 0; left: 0;
            width: 75%; height: 95%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.95;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: left bottom;
            mask-image: radial-gradient(circle at left bottom, black 30%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at left bottom, black 30%, transparent 90%);
            transition: all 0.8s ease;
        }

        .glass-pane {
            position: absolute;
            inset: 0;
            z-index: 2;
            border-radius: 32px;
            background: transparent;
            
            /* שבירת אור בלבד - המרכז נשאר חד וקריא */
            backdrop-filter: url(#clean-refraction);
            -webkit-backdrop-filter: url(#clean-refraction);
            
            /* החזרת הקו הלבן הדק והיוקרתי */
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .content-layer {
            position: relative;
            z-index: 3;
            padding: 28px;
            display: flex; flex-direction: column;
            pointer-events: none;
        }

        .task-top { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .course-label { font-size: 0.6rem; font-family: 'JetBrains Mono'; color: #fff; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; }
        .task-name { font-size: 1.3rem; font-weight: 800; color: #fff; margin: 14px 0; text-shadow: 0 2px 15px rgba(0,0,0,0.8); pointer-events: auto; }

        .check-container { width: 34px; height: 34px; cursor: pointer; pointer-events: auto; position: relative; }
        .check-container input { display: none; }
        .lens-cap {
            width: 100%; height: 100%; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s var(--spring);
        }

        .task-card-wrapper:has(:checked) .task-name { opacity: 0.2; }
        .task-card-wrapper:has(:checked) .art-backdrop { filter: brightness(0.1); opacity: 0.3; }
        .task-card-wrapper:has(:checked) .lens-cap { background: #4ade80; border-color: #4ade80; }
        .lens-cap::after { content: '✓'; color: #000; font-weight: 900; display: none; font-size: 1.1rem; }
        .task-card-wrapper:has(:checked) .lens-cap::after { display: block; }

        .task-card-wrapper.urgent .glass-pane { border: 2px solid #22d3ee; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        .urgent-led { width: 8px; height: 8px; background: #ff4757; border-radius: 50%; box-shadow: 0 0 10px #ff4757; animation: led-blink 2s infinite ease-in-out; }

        @keyframes led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .due-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
        .countdown { color: var(--accent); font-weight: 800; font-size: 0.8rem; }
        .full-date { font-size: 0.65rem; color: #94a3b8; font-family: 'JetBrains Mono'; }
        .empty-state { text-align: center; padding: 100px 20px; color: #475569; font-family: 'JetBrains Mono'; font-size: 0.7rem; }
    </style>
</head>
<body>
    <!-- מנוע אופטי נקי - ללא תאורה משבשת -->
    <svg style="position: fixed; width: 0; height: 0;">
        <filter id="clean-refraction">
            <feGaussianBlur stdDeviation="3" in="SourceAlpha" result="edge-blur" />
            <feDisplacementMap in="SourceGraphic" in2="edge-blur" scale="15" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="container">
        <div class="header">
            <div style="display:flex; flex-direction:column; gap: 2px;">
                <h2>TASK_COMMAND</h2>
                <div id="sync-status">READY</div>
            </div>
            <div style="display:flex; gap:20px; align-items:center;">
                <button id="archive-toggle"></button>
                <button id="refresh" style="border:none; cursor:pointer; background:none; color:#fff; font-size:1.2rem;">↻</button>
            </div>
        </div>
        <div id="tasks">
            <div class="empty-state">SYNCING_OPTICS...</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
